<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кликер для Telegram</title>
    <!-- Подключаем библиотеку Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }
        
        #username {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .score-container {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }
        
        #score {
            font-size: 72px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .click-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            border-radius: 15px;
            padding: 25px 40px;
            font-size: 32px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            width: 100%;
            margin: 20px 0;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .click-btn:active {
            transform: scale(0.95);
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }
        
        .info {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🍪 Кликер</h1>
        <div id="username">Загрузка...</div>
        
        <div class="score-container">
            <div id="score">0</div>
        </div>
        
        <button class="click-btn" id="clickBtn">
            👆 КЛИК
        </button>
        
        <div class="info">
            Кликай сколько хочешь!
        </div>
    </div>

    <script>
        // Получаем объект Telegram WebApp
        const tg = window.Telegram?.WebApp;
        
        // Переменные для игры
        let score = 0;
        let userId = null;
        
        // Проверяем, открыто ли приложение в Telegram
        if (tg) {
            // Сообщаем Telegram, что приложение готово
            tg.ready();
            
            // Делаем кнопку "Назад" в Telegram (она появится вверху)
            tg.MainButton.text = "Закрыть";
            tg.MainButton.show();
            
            // Получаем данные пользователя
            const user = tg.initDataUnsafe?.user;
            
            if (user) {
                userId = user.id;
                const username = user.first_name || 'Игрок';
                document.getElementById('username').innerHTML = `Привет, <span style="color: #667eea">${username}</span>! 👋`;
            } else {
                document.getElementById('username').innerHTML = 'Режим тестирования (не в Telegram)';
            }
            
            // Обработчик нажатия на главную кнопку Telegram
            tg.onEvent('mainButtonClicked', function() {
                tg.close();
            });
            
        } else {
            document.getElementById('username').innerHTML = 'Открой меня в Telegram! 😊';
        }
        
        // Логика кликера
        const clickBtn = document.getElementById('clickBtn');
        const scoreElement = document.getElementById('score');
        
        clickBtn.addEventListener('click', function() {
            // Увеличиваем счет
            score++;
            scoreElement.textContent = score;
            
            // Анимация при клике
            clickBtn.style.transform = 'scale(0.95)';
            setTimeout(() => {
                clickBtn.style.transform = 'scale(1)';
            }, 100);
            
            // Если открыто в Telegram, можно отправить данные
            if (tg && userId) {
                // Отправляем данные боту (опционально)
                // tg.sendData(JSON.stringify({ user_id: userId, score: score }));
                console.log('Клик! Счет:', score);
            }
        });
    </script>
</body>
</html>
