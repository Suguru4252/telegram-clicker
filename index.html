<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clicker PRO — Мега-версия</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .app-container {
            width: 100%;
            max-width: 400px;
            height: 95vh;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px 30px 20px 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        /* Шапка */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: center;
            position: relative;
        }
        
        .balance-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
        }
        
        .balance-box {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 15px;
            flex: 1;
            margin: 0 5px;
        }
        
        .balance-label {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .balance-value {
            font-size: 20px;
            font-weight: bold;
        }
        
        .username {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .level-bar {
            background: rgba(255,255,255,0.2);
            height: 6px;
            border-radius: 3px;
            margin: 10px 0;
            overflow: hidden;
        }
        
        .level-progress {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            width: 0%;
            border-radius: 3px;
        }
        
        /* Навигация */
        .nav-tabs {
            display: flex;
            background: rgba(255,255,255,0.1);
            padding: 5px;
            gap: 5px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        
        .nav-tabs::-webkit-scrollbar {
            display: none;
        }
        
        .nav-tab {
            flex: 1;
            min-width: 60px;
            text-align: center;
            padding: 8px 5px;
            color: rgba(255,255,255,0.6);
            border-radius: 15px;
            transition: all 0.3s;
            cursor: pointer;
            font-size: 12px;
        }
        
        .nav-tab span {
            font-size: 20px;
            display: block;
            margin-bottom: 3px;
        }
        
        .nav-tab.active {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        
        /* Контент */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            color: white;
        }
        
        /* Карточки */
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .card-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #ffd700;
        }
        
        /* Кнопки */
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
            margin: 5px 0;
            font-size: 14px;
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
        }
        
        /* Главная */
        .clicker-area {
            text-align: center;
            padding: 20px 0;
        }
        
        .click-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            border-radius: 50%;
            width: 220px;
            height: 220px;
            font-size: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            margin: 10px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 4px solid rgba(255,255,255,0.3);
        }
        
        .click-btn:active {
            transform: scale(0.95);
        }
        
        .click-btn span {
            font-size: 24px;
            margin-top: 10px;
        }
        
        .per-second {
            color: #4CAF50;
            font-weight: bold;
            font-size: 18px;
            margin: 10px 0;
        }
        
        /* Магазин */
        .shop-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .item-info {
            flex: 1;
        }
        
        .item-name {
            font-weight: bold;
            color: #ffd700;
            font-size: 14px;
        }
        
        .item-desc {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
        }
        
        .item-price {
            color: #4CAF50;
            font-weight: bold;
            font-size: 13px;
            margin: 3px 0;
        }
        
        .item-price-diamond {
            color: #ffd700;
            font-weight: bold;
            font-size: 13px;
            margin: 3px 0;
        }
        
        .item-level {
            color: #ff9800;
            font-size: 11px;
        }
        
        .buy-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-left: 5px;
        }
        
        .buy-btn-diamond {
            background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%);
            color: #333;
        }
        
        /* Турниры */
        .tournament-header {
            text-align: center;
            margin-bottom: 15px;
        }
        
        .tournament-prize {
            font-size: 24px;
            color: #ffd700;
            font-weight: bold;
        }
        
        .tournament-timer {
            font-size: 18px;
            color: #ff9800;
            margin: 10px 0;
        }
        
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .rank-1 { color: #ffd700; }
        .rank-2 { color: #c0c0c0; }
        .rank-3 { color: #cd7f32; }
        
        .player-rank {
            font-weight: bold;
        }
        
        .player-score {
            color: #4CAF50;
        }
        
        /* Ежедневные бонусы */
        .bonus-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .bonus-day {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 12px 5px;
            text-align: center;
            font-size: 12px;
            border: 1px solid transparent;
        }
        
        .bonus-day.collected {
            background: rgba(76, 175, 80, 0.3);
            border-color: #4CAF50;
        }
        
        .bonus-day.today {
            border: 2px solid #ffd700;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { border-color: #ffd700; }
            50% { border-color: #ffaa00; }
            100% { border-color: #ffd700; }
        }
        
        .bonus-value {
            font-size: 16px;
            font-weight: bold;
            color: #ffd700;
        }
        
        /* Боссы */
        .boss-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .boss-name {
            font-size: 24px;
            font-weight: bold;
            color: #f44336;
            margin-bottom: 10px;
        }
        
        .boss-level {
            color: #ff9800;
            margin-bottom: 15px;
        }
        
        .boss-health {
            background: rgba(255,255,255,0.1);
            height: 25px;
            border-radius: 12px;
            margin: 15px 0;
            overflow: hidden;
            position: relative;
        }
        
        .boss-health-bar {
            height: 100%;
            background: linear-gradient(90deg, #f44336, #ff9800);
            width: 100%;
            transition: width 0.3s;
        }
        
        .boss-health-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 12px;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
        }
        
        .boss-reward {
            color: #ffd700;
            font-size: 18px;
            margin: 10px 0;
        }
        
        /* Кланы */
        .clan-info {
            text-align: center;
            margin-bottom: 15px;
        }
        
        .clan-name {
            font-size: 24px;
            color: #ffd700;
            font-weight: bold;
        }
        
        .clan-members {
            color: #4CAF50;
            margin: 10px 0;
        }
        
        .clan-bank {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            margin: 15px 0;
        }
        
        .clan-bank-value {
            font-size: 28px;
            color: #ffd700;
            font-weight: bold;
        }
        
        .member-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        /* Бизнес */
        .business-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
        }
        
        .business-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .business-name {
            font-size: 16px;
            font-weight: bold;
            color: #4CAF50;
        }
        
        .business-income {
            color: #ffd700;
            font-size: 14px;
        }
        
        .business-manager {
            font-size: 12px;
            color: #ff9800;
        }
        
        .business-progress {
            background: rgba(255,255,255,0.1);
            height: 4px;
            border-radius: 2px;
            margin: 8px 0;
            overflow: hidden;
        }
        
        .business-bar {
            height: 100%;
            background: #4CAF50;
            width: 0%;
        }
        
        /* Мини-игры */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .game-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .game-card:active {
            transform: scale(0.95);
        }
        
        .game-card span {
            font-size: 40px;
            display: block;
            margin-bottom: 10px;
        }
        
        .game-card .game-name {
            font-size: 14px;
            font-weight: bold;
        }
        
        .game-card .game-desc {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
        }
        
        .game-play-area {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        
        .game-result {
            font-size: 24px;
            margin: 15px 0;
            min-height: 40px;
        }
        
        .game-input {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            margin: 10px 0;
            text-align: center;
            font-size: 18px;
        }
        
        /* Достижения */
        .achievements-grid {
            display: grid;
            gap: 10px;
        }
        
        .achievement-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            border: 1px solid transparent;
        }
        
        .achievement-item.completed {
            border-color: #ffd700;
            background: rgba(255,215,0,0.1);
        }
        
        .achievement-icon {
            font-size: 28px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .achievement-info {
            flex: 1;
        }
        
        .achievement-name {
            font-weight: bold;
            font-size: 14px;
        }
        
        .achievement-desc {
            font-size: 11px;
            opacity: 0.7;
            margin: 3px 0;
        }
        
        .achievement-reward {
            color: #ffd700;
            font-size: 12px;
        }
        
        .achievement-progress {
            background: rgba(255,255,255,0.1);
            height: 4px;
            border-radius: 2px;
            margin-top: 5px;
            width: 100%;
        }
        
        .achievement-fill {
            height: 100%;
            background: #ffd700;
            width: 0%;
            border-radius: 2px;
        }
        
        /* Скрытые элементы */
        .hidden {
            display: none;
        }
        
        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #16213e;
            border-radius: 20px;
            padding: 25px;
            max-width: 300px;
            width: 90%;
            color: white;
            text-align: center;
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #ffd700;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Шапка -->
        <div class="header">
            <div class="username" id="username">Загрузка...</div>
            
            <div class="balance-container">
                <div class="balance-box">
                    <div class="balance-label">💰 Монеты</div>
                    <div class="balance-value" id="balance">0</div>
                </div>
                <div class="balance-box">
                    <div class="balance-label">💎 Алмазы</div>
                    <div class="balance-value" id="diamonds">0</div>
                </div>
                <div class="balance-box">
                    <div class="balance-label">📊 Уровень</div>
                    <div class="balance-value" id="level">1</div>
                </div>
            </div>
            
            <div class="level-bar">
                <div class="level-progress" id="levelProgress" style="width: 0%"></div>
            </div>
            <div id="expDisplay" style="font-size: 11px;">0/100 опыта</div>
        </div>

        <!-- Навигация -->
        <div class="nav-tabs" id="navTabs">
            <div class="nav-tab active" onclick="switchTab('home')"><span>🏠</span>Главная</div>
            <div class="nav-tab" onclick="switchTab('shop')"><span>🏪</span>Магазин</div>
            <div class="nav-tab" onclick="switchTab('tournament')"><span>🏆</span>Турнир</div>
            <div class="nav-tab" onclick="switchTab('boss')"><span>🐉</span>Босс</div>
            <div class="nav-tab" onclick="switchTab('clan')"><span>👥</span>Клан</div>
            <div class="nav-tab" onclick="switchTab('business')"><span>💼</span>Бизнес</div>
            <div class="nav-tab" onclick="switchTab('games')"><span>🎮</span>Игры</div>
            <div class="nav-tab" onclick="switchTab('achievements')"><span>🏅</span>Достиж</div>
        </div>

        <!-- Контент -->
        <div class="content" id="content">
            <!-- Главная (заполняется JS) -->
        </div>
    </div>

    <!-- Модальные окна -->
    <div class="modal" id="gameModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">Игра</div>
            <div id="modalContent"></div>
            <div class="modal-buttons">
                <button class="modal-btn" onclick="closeModal()" style="background:#f44336; color:white;">Закрыть</button>
                <button class="modal-btn" id="modalActionBtn" style="background:#4CAF50; color:white;">Играть</button>
            </div>
        </div>
    </div>

    <script>
        // Telegram WebApp
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.MainButton.text = "Закрыть";
            tg.MainButton.show();
            tg.onEvent('mainButtonClicked', function() {
                tg.close();
            });
        }

        // ==================== СОСТОЯНИЕ ИГРЫ ====================
        let gameState = {
            // Ресурсы
            balance: 1000,
            diamonds: 50,
            exp: 0,
            level: 1,
            
            // Улучшения
            clickPower: 1,
            clickPowerLevel: 0,
            autoClickerLevel: 0,
            critLevel: 0,
            critChance: 0,
            
            // Бизнес
            factories: [0, 0, 0, 0, 0],
            factoryManagers: [false, false, false, false, false],
            factoryIncome: [1, 5, 20, 100, 500],
            factoryPrices: [100, 500, 2000, 10000, 50000],
            factoryNames: ["🍪 Пекарня", "🏭 Заводик", "🏢 Фабрика", "🏛️ Корпорация", "🌍 Империя"],
            
            // Турнир
            tournamentScore: 0,
            tournamentPlace: 0,
            tournamentPrize: 0,
            tournamentTime: 86400, // 24 часа в секундах
            
            // Ежедневные бонусы
            lastBonusDay: 0,
            bonusDay: 1,
            bonusCollected: [false, false, false, false, false, false, false],
            
            // Босс
            bossLevel: 1,
            bossHealth: 1000,
            bossMaxHealth: 1000,
            
            // Клан
            clanName: "Нет клана",
            clanMembers: 1,
            clanBank: 0,
            clanBonus: 1,
            
            // Достижения
            totalClicks: 0,
            totalEarned: 0,
            bossesKilled: 0,
            gamesWon: 0,
            
            // Статистика
            playTime: 0,
            lastSave: Date.now()
        };

        // Цены улучшений
        const prices = {
            clickPower: [50, 150, 500, 2000, 10000],
            autoClicker: [100, 300, 1000, 5000, 25000],
            crit: [200, 600, 2000, 10000, 50000]
        };

        // Достижения
        const achievements = [
            { id: 0, name: "Новичок", desc: "Накликать 100 монет", icon: "🌱", target: 100, type: "earn", reward: 50 },
            { id: 1, name: "Трудяга", desc: "Накликать 1000 монет", icon: "💪", target: 1000, type: "earn", reward: 200 },
            { id: 2, name: "Магнат", desc: "Накликать 10000 монет", icon: "💰", target: 10000, type: "earn", reward: 500 },
            { id: 3, name: "Кликер", desc: "Сделать 100 кликов", icon: "👆", target: 100, type: "clicks", reward: 100 },
            { id: 4, name: "Кликер-про", desc: "Сделать 1000 кликов", icon: "👆", target: 1000, type: "clicks", reward: 300 },
            { id: 5, name: "Охотник", desc: "Победить 10 боссов", icon: "🐉", target: 10, type: "boss", reward: 200 },
            { id: 6, name: "Герой", desc: "Победить 100 боссов", icon: "🏆", target: 100, type: "boss", reward: 1000 },
            { id: 7, name: "Игрок", desc: "Выиграть в 10 мини-игр", icon: "🎮", target: 10, type: "games", reward: 150 },
            { id: 8, name: "Бизнесмен", desc: "Купить 5 фабрик", icon: "💼", target: 5, type: "factories", reward: 200 },
            { id: 9, name: "Магнат", desc: "Нанять 5 менеджеров", icon: "👔", target: 5, type: "managers", reward: 500 }
        ];

        // ==================== ЗАГРУЗКА/СОХРАНЕНИЕ ====================
        function loadGame() {
            const saved = localStorage.getItem('megaClickerSave');
            if (saved) {
                try {
                    const loaded = JSON.parse(saved);
                    gameState = {...gameState, ...loaded};
                } catch (e) {
                    console.log('Ошибка загрузки');
                }
            }
            updateUI();
        }

        function saveGame() {
            localStorage.setItem('megaClickerSave', JSON.stringify(gameState));
        }

        // ==================== ОБНОВЛЕНИЕ UI ====================
        function updateUI() {
            document.getElementById('balance').textContent = Math.floor(gameState.balance);
            document.getElementById('diamonds').textContent = Math.floor(gameState.diamonds);
            document.getElementById('level').textContent = gameState.level;
            
            // Прогресс уровня
            const expNeeded = gameState.level * 100;
            const expPercent = (gameState.exp / expNeeded) * 100;
            document.getElementById('levelProgress').style.width = Math.min(expPercent, 100) + '%';
            document.getElementById('expDisplay').textContent = `${Math.floor(gameState.exp)}/${expNeeded} опыта`;
            
            // Обновляем текущую вкладку
            const activeTab = document.querySelector('.nav-tab.active')?.textContent.includes('Главная') ? 'home' :
                             document.querySelector('.nav-tab.active')?.textContent.includes('Магазин') ? 'shop' :
                             document.querySelector('.nav-tab.active')?.textContent.includes('Турнир') ? 'tournament' :
                             document.querySelector('.nav-tab.active')?.textContent.includes('Босс') ? 'boss' :
                             document.querySelector('.nav-tab.active')?.textContent.includes('Клан') ? 'clan' :
                             document.querySelector('.nav-tab.active')?.textContent.includes('Бизнес') ? 'business' :
                             document.querySelector('.nav-tab.active')?.textContent.includes('Игры') ? 'games' : 'achievements';
            
            renderTab(activeTab);
        }

        // ==================== ДОБАВЛЕНИЕ ОПЫТА ====================
        function addExp(amount) {
            gameState.exp += amount;
            const expNeeded = gameState.level * 100;
            while (gameState.exp >= expNeeded) {
                gameState.exp -= expNeeded;
                gameState.level++;
                gameState.diamonds += gameState.level * 10;
                showMessage(`🎉 Уровень ${gameState.level}! +${gameState.level * 10}💎`);
            }
        }

        // ==================== ПРОВЕРКА ДОСТИЖЕНИЙ ====================
        function checkAchievements() {
            achievements.forEach((ach, index) => {
                let progress = 0;
                switch(ach.type) {
                    case 'earn': progress = gameState.totalEarned; break;
                    case 'clicks': progress = gameState.totalClicks; break;
                    case 'boss': progress = gameState.bossesKilled; break;
                    case 'games': progress = gameState.gamesWon; break;
                    case 'factories': progress = gameState.factories.reduce((a,b) => a + b, 0); break;
                    case 'managers': progress = gameState.factoryManagers.filter(Boolean).length; break;
                }
                
                if (progress >= ach.target && !localStorage.getItem(`ach_${index}`)) {
                    gameState.diamonds += ach.reward;
                    localStorage.setItem(`ach_${index}`, 'true');
                    showMessage(`🏅 Достижение: ${ach.name}! +${ach.reward}💎`);
                }
            });
        }

        // ==================== ПОКАЗ СООБЩЕНИЯ ====================
        function showMessage(text) {
            alert(text);
        }

        // ==================== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ====================
        function switchTab(tab) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            event.currentTarget.classList.add('active');
            renderTab(tab);
        }

                                <span>+${getClickPower()}</span>

                    shopHtml += '<div style="margin:15px 0 10px; color:#ffd700;">💎 ЗА АЛМАЗЫ</div>';
                    
                    shopHtml += `

                        let progress = 0;
                        switch(ach.type) {
                            case 'earn': progress = gameState.totalEarned; break;
                            case 'clicks': progress = gameState.totalClicks; break;
                            case 'boss': progress = gameState.bossesKilled; break;
                            case 'games': progress = gameState.gamesWon; break;
                            case 'factories': progress = gameState.factories.reduce((a,b) => a + b, 0); break;
                            case 'managers': progress = gameState.factoryManagers.filter(Boolean).length; break;

                        const completed = progress >= ach.target;
                        const percent = Math.min((progress / ach.target) * 100, 100);
                        
                        achHtml += `
                            <div class="achievement-item ${completed ? 'completed' : ''}">

                                    <div class="achievement-progress">
                                        <div class="achievement-fill" style="width: ${percent}%"></div>
                                    </div>
                                    <div style="font-size:10px;">${progress}/${ach.target}</div>

            if (tab === 'tournament') {
                document.getElementById('tournamentPrize').textContent = gameState.tournamentPrize + ' 💰';
                updateLeaderboard();
                startTournamentTimer();
            }
        }

        // ==================== ОСНОВНАЯ МЕХАНИКА ====================
        function getClickPower() {
            let power = gameState.clickPower * (1 + gameState.clickPowerLevel * 0.5);
            
            // Проверка крита
            if (Math.random() * 100 < gameState.critLevel * 10) {
                power *= 10;
            }
            
            return Math.floor(power);
        }

        function handleClick() {
            const power = getClickPower();
            gameState.balance += power;
            gameState.totalClicks++;
            gameState.totalEarned += power;
            gameState.tournamentScore += power;
            
            addExp(power / 10);
            
            // Анимация
            const btn = document.getElementById('clickBtn');
            btn.style.transform = 'scale(0.95)';
            setTimeout(() => btn.style.transform = 'scale(1)', 100);
            
            updateUI();
        }

        // ==================== ПОКУПКА УЛУЧШЕНИЙ ====================
        function buyUpgrade(type) {
            const level = gameState[type + 'Level'];
            if (level >= 5) return;
            
            const price = prices[type][level];
            
            if (gameState.balance >= price) {
                gameState.balance -= price;
                gameState[type + 'Level']++;
                updateUI();
                saveGame();
            } else {
                showMessage('❌ Недостаточно монет!');
            }
        }

        // ==================== БИЗНЕС ====================
        function buyFactory(index) {
            if (gameState.factories[index] >= 5) return;
            
            if (gameState.balance >= gameState.factoryPrices[index]) {
                gameState.balance -= gameState.factoryPrices[index];
                gameState.factories[index]++;
                updateUI();
                saveGame();
            } else {
                showMessage('❌ Недостаточно монет!');
            }
        }

        function hireManager(index) {
            if (gameState.diamonds >= 50 && !gameState.factoryManagers[index]) {
                gameState.diamonds -= 50;
                gameState.factoryManagers[index] = true;
                updateUI();
                saveGame();
            } else {
                showMessage('❌ Недостаточно алмазов!');
            }
        }

        // ==================== ПРЕМИУМ ====================
        function exchangeDiamonds(amount) {
            if (gameState.diamonds >= amount) {
                gameState.diamonds -= amount;
                gameState.balance += amount * 100;
                updateUI();
                saveGame();
            }
        }

        function buyBoost() {
            if (gameState.diamonds >= 50) {
                gameState.diamonds -= 50;
                // Удвоение дохода на 1 час (3600 секунд)
                gameState.clickPower *= 2;
                setTimeout(() => {
                    gameState.clickPower /= 2;
                    showMessage('⌛ Бонус удвоения закончился');
                }, 3600000);
                updateUI();
                saveGame();
            }
        }

        function buyExp() {
            if (gameState.diamonds >= 30) {
                gameState.diamonds -= 30;
                addExp(100);
                updateUI();
                saveGame();
            }
        }

        // ==================== БОСС ====================
        function attackBoss() {
            const damage = getClickPower();
            gameState.bossHealth -= damage;
            
            if (gameState.bossHealth <= 0) {
                gameState.bossHealth = 0;
                defeatBoss();
            }
            
            updateUI();
            saveGame();
        }

        function defeatBoss() {
            gameState.balance += gameState.bossLevel * 100;
            gameState.diamonds += Math.floor(gameState.bossLevel / 2) + 1;
            gameState.bossesKilled++;
            gameState.bossLevel++;
            gameState.bossMaxHealth = gameState.bossLevel * 1000;
            gameState.bossHealth = gameState.bossMaxHealth;
            
            showMessage(`🎉 Босс побежден! +${gameState.bossLevel * 100}💰 +${Math.floor(gameState.bossLevel / 2) + 1}💎`);
            checkAchievements();
        }

        function autoFight() {
            if (gameState.diamonds >= 50) {
                gameState.diamonds -= 50;
                
                // Автоматически побеждаем босса
                gameState.balance += gameState.bossLevel * 100;
                gameState.diamonds += Math.floor(gameState.bossLevel / 2) + 1;
                gameState.bossesKilled++;
                gameState.bossLevel++;
                gameState.bossMaxHealth = gameState.bossLevel * 1000;
                gameState.bossHealth = gameState.bossMaxHealth;
                
                updateUI();
                saveGame();
                checkAchievements();
            }
        }

        // ==================== ТУРНИР ====================
        function updateTournament() {
            // Обновляем приз
            gameState.tournamentPrize = 5000 + gameState.tournamentScore * 10;
            
            // Обновляем место игрока
            const playerScore = gameState.tournamentScore;
            if (playerScore > 10000) gameState.tournamentPlace = 1;
            else if (playerScore > 5000) gameState.tournamentPlace = 2;
            else if (playerScore > 1000) gameState.tournamentPlace = 3;
            else gameState.tournamentPlace = Math.floor(Math.random() * 10) + 4;
        }

        function joinTournament() {
            if (gameState.balance >= 100) {
                gameState.balance -= 100;
                gameState.tournamentScore = 0;
                updateUI();
                saveGame();
            }
        }

        function updateLeaderboard() {
            const leaderboard = document.getElementById('leaderboard');
            if (!leaderboard) return;
            
            let html = '';
            for (let i = 1; i <= 10; i++) {
                const rankClass = i === 1 ? 'rank-1' : i === 2 ? 'rank-2' : i === 3 ? 'rank-3' : '';
                const score = i === gameState.tournamentPlace ? gameState.tournamentScore : Math.floor(Math.random() * 10000) + 1000;
                
                html += `
                    <div class="leaderboard-item">
                        <span class="player-rank ${rankClass}">${i}. Игрок ${i}</span>
                        <span class="player-score">${score}</span>
                    </div>
                `;
            }
            leaderboard.innerHTML = html;
        }

        function startTournamentTimer() {
            setInterval(() => {
                if (gameState.tournamentTime > 0) {
                    gameState.tournamentTime--;
                    
                    const hours = Math.floor(gameState.tournamentTime / 3600);
                    const minutes = Math.floor((gameState.tournamentTime % 3600) / 60);
                    const seconds = gameState.tournamentTime % 60;
                    
                    const timer = document.getElementById('tournamentTimer');
                    if (timer) {
                        timer.textContent = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                    }
                } else {
                    // Раздача призов
                    if (gameState.tournamentPlace <= 3) {
                        const prize = [5000, 3000, 1000][gameState.tournamentPlace - 1];
                        gameState.balance += prize;
                        showMessage(`🏆 Турнир завершен! Вы на ${gameState.tournamentPlace} месте! +${prize}💰`);
                    }
                    
                    gameState.tournamentTime = 86400;
                    gameState.tournamentScore = 0;
                }
            }, 1000);
        }

        // ==================== ЕЖЕДНЕВНЫЕ БОНУСЫ ====================
        function checkDailyBonus() {
            const today = new Date().getDay();
            if (today !== gameState.lastBonusDay) {
                // Можно получить бонус
                if (!gameState.bonusCollected[gameState.bonusDay - 1]) {
                    const bonus = [100, 250, 500, 1000, 2500, 5000, 10000][gameState.bonusDay - 1];
                    gameState.balance += bonus;
                    gameState.bonusCollected[gameState.bonusDay - 1] = true;
                    
                    if (gameState.bonusDay === 7) {
                        gameState.diamonds += 100;
                        gameState.bonusDay = 1;
                        gameState.bonusCollected = [false, false, false, false, false, false, false];
                    } else {
                        gameState.bonusDay++;
                    }
                    
                    gameState.lastBonusDay = today;
                    showMessage(`🎁 Ежедневный бонус: +${bonus}💰!`);
                }
            }
        }

        // ==================== КЛАН ====================
        function donateToClan() {
            if (gameState.balance >= 1000) {
                gameState.balance -= 1000;
                gameState.clanBank += 1000;
                gameState.clanBonus++;
                updateUI();
                saveGame();
            }
        }

        function createClan() {
            if (gameState.diamonds >= 500) {
                const name = prompt('Название клана:');
                if (name) {
                    gameState.diamonds -= 500;
                    gameState.clanName = name;
                    gameState.clanMembers = 1;
                    document.getElementById('createClanBtn')?.remove();
                    updateUI();
                    saveGame();
                }
            }
        }

        // ==================== МИНИ-ИГРЫ ====================
        function openGame(game) {
            const modal = document.getElementById('gameModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            const actionBtn = document.getElementById('modalActionBtn');
            
            modal.classList.add('active');
            
            if (game === 'roulette') {
                modalTitle.textContent = '🎰 РУЛЕТКА';
                modalContent.innerHTML = `
                    <p>Ставка: 100💰</p>
                    <p>Красное = x2, Черное = x0</p>
                    <div style="display:flex; gap:10px; justify-content:center; margin:15px 0;">
                        <button class="modal-btn" onclick="playRoulette('red')" style="background:#f44336;">🔴 Красное</button>
                        <button class="modal-btn" onclick="playRoulette('black')" style="background:#333;">⚫ Черное</button>
                    </div>
                `;
                actionBtn.style.display = 'none';
            } else if (game === 'guess') {
                modalTitle.textContent = '🔢 УГАДАЙ ЧИСЛО';
                modalContent.innerHTML = `
                    <p>Ставка: 100💰</p>
                    <p>Угадай число от 1 до 5 (x5)</p>
                    <input type="number" id="guessInput" min="1" max="5" class="game-input" placeholder="Введи число">
                `;
                actionBtn.style.display = 'block';
                actionBtn.textContent = 'Проверить';
                actionBtn.onclick = playGuess;
            }
        }

        function playRoulette(color) {
            if (gameState.balance < 100) {
                showMessage('❌ Недостаточно монет!');
                return;
            }
            
            gameState.balance -= 100;
            const result = Math.random() < 0.5 ? 'red' : 'black';
            
            if (color === result) {
                gameState.balance += 200;
                gameState.gamesWon++;
                showMessage('🎉 Вы выиграли! +200💰');
            } else {
                showMessage('😢 Вы проиграли...');
            }
            
            closeModal();
            updateUI();
        }

        function playGuess() {
            const guess = parseInt(document.getElementById('guessInput').value);
            if (isNaN(guess) || guess < 1 || guess > 5) {
                showMessage('❌ Введите число от 1 до 5');
                return;
            }
            
            if (gameState.balance < 100) {
                showMessage('❌ Недостаточно монет!');
                return;
            }
            
            gameState.balance -= 100;
            const number = Math.floor(Math.random() * 5) + 1;
            
            if (guess === number) {
                gameState.balance += 500;
                gameState.gamesWon++;
                showMessage(`🎉 Угадали! Число было ${number}! +500💰`);
            } else {
                showMessage(`😢 Не угадали... Было число ${number}`);
            }
            
            closeModal();
            updateUI();
        }

        // ==================== МОДАЛЬНЫЕ ОКНА ====================
        function closeModal() {
            document.getElementById('gameModal').classList.remove('active');
        }

        // ==================== АВТОМАТИЧЕСКИЕ ПРОЦЕССЫ ====================
        setInterval(() => {
            // Автокликер
            if (gameState.autoClickerLevel > 0) {
                gameState.balance += gameState.autoClickerLevel;
                gameState.totalEarned += gameState.autoClickerLevel;
            }
            
            // Бизнес доход
            gameState.factories.forEach((count, i) => {
                if (count > 0) {
                    const income = gameState.factoryIncome[i] * count;
                    gameState.balance += income;
                    gameState.totalEarned += income;
                    
                    // Если есть менеджер, доход удваивается
                    if (gameState.factoryManagers[i]) {
                        gameState.balance += income;
                        gameState.totalEarned += income;
                    }
                }
            });
            
            // Клан бонус
            if (gameState.clanBonus > 1) {
                gameState.balance = Math.floor(gameState.balance * (1 + gameState.clanBonus / 100));
            }
            
            gameState.playTime++;
            
            updateUI();
            saveGame();
        }, 1000);

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        window.onload = function() {
            loadGame();
            
            // Telegram
            if (tg) {
                const user = tg.initDataUnsafe?.user;
                if (user) {
                    document.getElementById('username').textContent = `Привет, ${user.first_name || 'Игрок'}! 👋`;
                }
            }
            
            // Проверка ежедневных бонусов
            checkDailyBonus();
            
            // Автосохранение каждые 30 секунд
            setInterval(saveGame, 30000);
        };
    </script>
</body>
</html>
