<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMPERIA CLICKER 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a050f 0%, #1a1025 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px;
        }
        
        .app-container {
            width: 100%;
            max-width: 400px;
            height: 98vh;
            background: rgba(10, 5, 20, 0.97);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            border: 2px solid #ffd700;
        }
        
        /* Шапка */
        .header {
            background: linear-gradient(135deg, #2a1b3d 0%, #1a0f2a 100%);
            color: white;
            padding: 15px;
            text-align: center;
            border-bottom: 3px solid #ffd700;
        }
        
        .username {
            font-size: 14px;
            color: #ffd700;
            font-weight: bold;
        }
        
        .offline-badge {
            background: rgba(255, 215, 0, 0.25);
            border: 2px solid #ffd700;
            border-radius: 30px;
            padding: 8px 15px;
            font-size: 14px;
            display: inline-block;
            color: #ffd700;
            margin: 5px 0;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
        
        .balance-container {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin: 15px 0;
        }
        
        .balance-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 5px;
            border-radius: 15px;
            flex: 1;
            border: 2px solid rgba(255, 215, 0, 0.5);
        }
        
        .balance-label {
            font-size: 11px;
            opacity: 0.9;
        }
        
        .balance-value {
            font-size: 16px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .level-bar {
            background: rgba(255, 255, 255, 0.2);
            height: 8px;
            border-radius: 4px;
            margin: 10px 0;
            overflow: hidden;
        }
        
        .level-progress {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            width: 0%;
            border-radius: 4px;
        }
        
        /* Контент */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            color: white;
            scrollbar-width: none;
        }
        
        .content::-webkit-scrollbar {
            display: none;
        }
        
        /* Главная страница - кликабельная вся */
        #home-content {
            min-height: 100%;
            cursor: pointer;
            padding: 10px 0;
        }
        
        .clicker-area {
            text-align: center;
            pointer-events: none;
        }
        
        .click-btn {
            background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
            border: none;
            border-radius: 50%;
            width: 200px;
            height: 200px;
            font-size: 60px;
            color: white;
            margin: 20px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 4px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.6);
            pointer-events: none;
        }
        
        .click-btn span {
            font-size: 20px;
            margin-top: 10px;
        }
        
        .per-second {
            color: #4CAF50;
            font-size: 18px;
            margin: 10px 0;
            font-weight: bold;
            pointer-events: none;
        }
        
        .offline-earnings {
            background: rgba(255, 215, 0, 0.15);
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            font-size: 16px;
            animation: pulse 2s infinite;
            font-weight: bold;
            pointer-events: none;
        }
        
        /* Карточки */
        .card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .card-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ffd700;
            text-align: center;
            border-bottom: 2px solid #ffd700;
            padding-bottom: 10px;
        }
        
        /* Кнопки (КРУПНЫЕ) */
        .btn {

            color: white;
            padding: 18px 25px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            font-size: 18px;
            transition: transform 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn:active {
            transform: scale(0.97);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
        }
        
        .btn-gold {
            background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
            color: black;
            font-weight: bold;
        }
        
        .btn-buy {
            background: linear-gradient(135deg, #4a2a5a 0%, #3a1a4a 100%);
            border: 2px solid #4CAF50;
            padding: 15px 20px;
            font-size: 16px;
        }
        
        /* Нижняя навигация (КРУПНЕЕ) */
        .bottom-nav {
            display: flex;
            background: rgba(0, 0, 0, 0.9);
            padding: 10px 5px;
            gap: 5px;
            border-top: 3px solid #ffd700;
        }
        
        .nav-item {
            flex: 1;
            text-align: center;
            padding: 12px 2px;
            color: rgba(255, 255, 255, 0.6);
            border-radius: 15px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.3s;
        }
        
        .nav-item span {
            font-size: 22px;
            display: block;
            margin-bottom: 5px;
        }
        
        .nav-item.active {
            color: #ffd700;
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid #ffd700;
        }
        
        /* Магазин */
        .shop-item {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .item-info {
            flex: 1;
        }
        
        .item-name {
            font-weight: bold;
            color: #ffd700;
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .item-desc {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 5px;
        }
        
        .item-price {
            color: #4CAF50;
            font-weight: bold;
            font-size: 16px;
        }
        
        .item-level {
            color: #ff9800;
            font-size: 14px;
        }
        
        .buy-btn {
            background: linear-gradient(135deg, #4a2a6a 0%, #3a1a5a 100%);
            border: 2px solid #ffd700;
            color: white;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .buy-btn-diamond {
            background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
            color: #333;
        }
        
        /* Сетка недвижимости */
        .property-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .property-category {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 20px;
            padding: 25px 10px;
            text-align: center;
            cursor: pointer;
            border: 2px solid rgba(255, 215, 0, 0.4);

        .property-category:active {
            transform: scale(0.95);
            background: rgba(255, 215, 0, 0.15);
        }
        
        .property-category span {
            font-size: 48px;
            display: block;
            margin-bottom: 15px;
        }
        
        .category-name {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .category-count {
            font-size: 16px;
            color: #ffd700;
            font-weight: bold;
        }
        
        /* Список имущества */
        .property-list {
            margin-top: 10px;
        }
        
        .property-item {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .property-emoji {
            font-size: 42px;
            width: 70px;
            text-align: center;

        .property-details {
            flex: 1;
        }
        
        .property-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .property-price {
            color: #ffd700;
            font-size: 16px;
            margin-bottom: 3px;
        }
        
        .property-income {
            color: #4CAF50;
            font-size: 14px;
        }
        
        .property-owned {
            background: #2e7d32;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid #ffd700;
        }
        
        /* Бизнес */
        .business-item {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 15px;
            cursor: pointer;
            border: 2px solid rgba(255, 215, 0, 0.3);
            transition: all 0.3s;
        }
        
        .business-item:active {
            transform: scale(0.98);
            background: rgba(255, 215, 0, 0.1);
        }
        
        .business-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .business-name {
            font-weight: bold;
            color: #ffd700;
            font-size: 20px;
        }
        
        .business-level {
            color: #4CAF50;
            font-size: 16px;
            font-weight: bold;
        }
        
        .business-stats {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.9);
            margin: 10px 0;
        }
        
        .business-progress {
            background: rgba(255, 255, 255, 0.15);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .business-bar {
            height: 100%;
            background: #ffd700;
            width: 0%;
        }
        
        .upgrade-time {
            font-size: 14px;
            color: #ff9800;
            font-weight: bold;
        }
        
        .business-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        
        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #1a1025;
            border-radius: 30px;
            padding: 30px;
            max-width: 350px;
            width: 90%;
            color: white;
            border: 3px solid #ffd700;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ffd700;
            text-align: center;
        }
        
        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 15px;
            border-radius: 25px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        
        .close-btn {
            background: #f44336;
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            text-align: center;
            margin-top: 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            border: 1px solid #ffd700;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Шапка -->
        <div class="header">
            <div class="username" id="username">IMPERIA</div>
            <div class="offline-badge" id="offlineBadge" style="display:none;">⏱️ ОФФЛАЙН ДОХОД</div>
            
            <div class="balance-container">
                <div class="balance-box">
                    <div class="balance-label">💰 МОНЕТЫ</div>
                    <div class="balance-value" id="balance">0</div>
                </div>
                <div class="balance-box">
                    <div class="balance-label">💎 АЛМАЗЫ</div>
                    <div class="balance-value" id="diamonds">10</div>
                </div>
                <div class="balance-box">
                    <div class="balance-label">📊 УРОВЕНЬ</div>
                    <div class="balance-value" id="level">1</div>
                </div>
            </div>
            
            <div class="level-bar">
                <div class="level-progress" id="levelProgress"></div>
            </div>
        </div>
        
        <!-- Контент -->
        <div class="content" id="content"></div>
        
        <!-- Нижняя навигация -->
        <div class="bottom-nav">
            <div class="nav-item active" data-tab="home"><span>🏠</span>ГЛАВНАЯ</div>
            <div class="nav-item" data-tab="mybusiness"><span>💼</span>БИЗНЕСЫ</div>
            <div class="nav-item" data-tab="property"><span>🏰</span>НЕДВИЖ.</div>
            <div class="nav-item" data-tab="shop"><span>🏪</span>МАГАЗИН</div>
            <div class="nav-item" data-tab="stats"><span>📊</span>СТАТИС.</div>
        </div>
    </div>
    
    <!-- Модальное окно для бизнеса -->
    <div class="modal" id="businessModal">
        <div class="modal-content" id="businessModalContent"></div>
    </div>
    
    <!-- Модальное окно для недвижимости -->
    <div class="modal" id="propertyModal">
        <div class="modal-content" id="propertyModalContent"></div>
    </div>
    
    <script>
        // Telegram
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }
        
        // ========== СОСТОЯНИЕ ИГРЫ ==========
        let gameState = {
            // Ресурсы
            balance: 0,
            diamonds: 10,
            exp: 0,
            level: 1,
            
            // Улучшения
            clickPower: 1,
            clickPowerLevel: 0,
            autoClickerLevel: 0,
            critLevel: 0,
            
            // Статистика
            totalClicks: 0,
            totalEarned: 0,
            playTime: 0,
            lastOnlineTime: Date.now(),
            
            // БИЗНЕСЫ (10 штук, 20 уровней)
            businesses: [
                { id: 0, name: "🚕 ТАКСОПАРК", level: 0, maxLevel: 20, baseIncome: 1, upgradeCost: 1000, upgradeTime: 30, upgradeEnd: 0, owned: false, totalEarned: 0 },
                { id: 1, name: "🍔 РЕСТОРАН", level: 0, maxLevel: 20, baseIncome: 2, upgradeCost: 5000, upgradeTime: 60, upgradeEnd: 0, owned: false, totalEarned: 0 },
                { id: 2, name: "⛽ ЗАПРАВКА", level: 0, maxLevel: 20, baseIncome: 5, upgradeCost: 25000, upgradeTime: 120, upgradeEnd: 0, owned: false, totalEarned: 0 },
                { id: 3, name: "🏭 ЗАВОД", level: 0, maxLevel: 20, baseIncome: 10, upgradeCost: 100000, upgradeTime: 180, upgradeEnd: 0, owned: false, totalEarned: 0 },
                { id: 4, name: "🏨 ОТЕЛЬ", level: 0, maxLevel: 20, baseIncome: 20, upgradeCost: 500000, upgradeTime: 300, upgradeEnd: 0, owned: false, totalEarned: 0 },
                { id: 5, name: "🎰 КАЗИНО", level: 0, maxLevel: 20, baseIncome: 50, upgradeCost: 2500000, upgradeTime: 600, upgradeEnd: 0, owned: false, totalEarned: 0 },
                { id: 6, name: "🏦 БАНК", level: 0, maxLevel: 20, baseIncome: 100, upgradeCost: 10000000, upgradeTime: 1200, upgradeEnd: 0, owned: false, totalEarned: 0 },
                { id: 7, name: "🛳️ ПОРТ", level: 0, maxLevel: 20, baseIncome: 200, upgradeCost: 50000000, upgradeTime: 2400, upgradeEnd: 0, owned: false, totalEarned: 0 },
                { id: 8, name: "✈️ АЭРОПОРТ", level: 0, maxLevel: 20, baseIncome: 500, upgradeCost: 250000000, upgradeTime: 4800, upgradeEnd: 0, owned: false, totalEarned: 0 },
                { id: 9, name: "🏛️ ИМПЕРИЯ", level: 0, maxLevel: 20, baseIncome: 1000, upgradeCost: 1000000000, upgradeTime: 9600, upgradeEnd: 0, owned: false, totalEarned: 0 }
            ],
            
            // НЕДВИЖИМОСТЬ
            houses: [
                { id: 0, name: "КВАРТИРА", emoji: "🏢", price: 50000, income: 5, owned: false },
                { id: 1, name: "ДОМ", emoji: "🏠", price: 500000, income: 50, owned: false },
                { id: 2, name: "ОСОБНЯК", emoji: "🏰", price: 5000000, income: 500, owned: false },
                { id: 3, name: "ВИЛЛА", emoji: "🏛️", price: 50000000, income: 5000, owned: false }
            ],
            cars: [
                { id: 0, name: "ЛАДА", emoji: "🚗", price: 20000, income: 2, owned: false },
                { id: 1, name: "МЕРСЕДЕС", emoji: "🚘", price: 200000, income: 20, owned: false },
                { id: 2, name: "ФЕРРАРИ", emoji: "🏎️", price: 2000000, income: 200, owned: false },
                { id: 3, name: "БУГАТТИ", emoji: "🚀", price: 20000000, income: 2000, owned: false }
            ],
            planes: [
                { id: 0, name: "КУКУРУЗНИК", emoji: "✈️", price: 100000, income: 10, owned: false },
                { id: 1, name: "БОИНГ", emoji: "🛩️", price: 1000000, income: 100, owned: false },
                { id: 2, name: "ЧАСТНЫЙ", emoji: "🛫", price: 10000000, income: 1000, owned: false },
                { id: 3, name: "РЕАКТИВНЫЙ", emoji: "🛬", price: 100000000, income: 10000, owned: false }
            ],
            ships: [
                { id: 0, name: "ЛОДКА", emoji: "🛶", price: 30000, income: 3, owned: false },
                { id: 1, name: "КАРТЕР", emoji: "⛵", price: 300000, income: 30, owned: false },
                { id: 2, name: "ЯХТА", emoji: "🛥️", price: 3000000, income: 300, owned: false },
                { id: 3, name: "ЛАЙНЕР", emoji: "🚢", price: 30000000, income: 3000, owned: false }
            ]
        };
        
        // Цены улучшений
        const upgradePrices = {
            clickPower: [1000, 5000, 25000, 125000, 625000],
            autoClicker: [2000, 10000, 50000, 250000, 1250000],
            crit: [5000, 25000, 125000, 625000, 3125000]
        };
        
        // Функция форматирования чисел
        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }
        
        // ========== ЗАГРУЗКА/СОХРАНЕНИЕ ==========
        function loadGame() {
            const saved = localStorage.getItem('imperiaFull2026');
            if (saved) {
                try {
                    const loaded = JSON.parse(saved);
                    gameState = { ...gameState, ...loaded };
                } catch(e) {}
            }
            
            // Оффлайн доход
            const now = Date.now();
            const secondsPassed = Math.floor((now - gameState.lastOnlineTime) / 1000);
            
            if (secondsPassed > 30) {
                let offlineIncome = gameState.autoClickerLevel * secondsPassed;
                
                gameState.businesses.forEach(b => {
                    if (b.owned && b.level > 0) {
                        offlineIncome += b.baseIncome * b.level * secondsPassed;
                        b.totalEarned += b.baseIncome * b.level * secondsPassed;
                    }
                });
                
                if (offlineIncome > 0) {
                    gameState.balance += Math.floor(offlineIncome);
                    gameState.totalEarned += Math.floor(offlineIncome);
                }
            }
            
            gameState.lastOnlineTime = now;
            updateUI();
            checkBusinessUpgrades();
        }
        
        function saveGame() {
            gameState.lastOnlineTime = Date.now();
            localStorage.setItem('imperiaFull2026', JSON.stringify(gameState));
        }
        
        function updateUI() {
            document.getElementById('balance').textContent = formatNumber(Math.floor(gameState.balance));
            document.getElementById('diamonds').textContent = gameState.diamonds;
            document.getElementById('level').textContent = gameState.level;
            
            const expNeeded = gameState.level * 1000;
            const expPercent = (gameState.exp / expNeeded) * 100;
            document.getElementById('levelProgress').style.width = Math.min(expPercent, 100) + '%';
            
            const activeTab = document.querySelector('.nav-item.active')?.dataset.tab || 'home';
            renderTab(activeTab);
        }
        
        // ========== КЛИК ==========
        function handleClick() {
            let power = gameState.clickPower * (1 + gameState.clickPowerLevel * 0.5);
            
            if (Math.random() * 100 < gameState.critLevel * 10) {
                power *= 10;
            }
            
            const earned = Math.floor(power);
            gameState.balance += earned;
            gameState.totalClicks++;
            gameState.totalEarned += earned;
            gameState.exp += earned / 100;
            
            while (gameState.exp >= gameState.level * 1000) {
                gameState.exp -= gameState.level * 1000;
                gameState.level++;
                gameState.diamonds += gameState.level * 5;
            }
            
            updateUI();
            saveGame();
        }
        
        // ========== ОТОБРАЖЕНИЕ ВКЛАДОК ==========
        function renderTab(tab) {
            const content = document.getElementById('content');

// ИСПРАВЛЕННАЯ ФУНКЦИЯ УЛУЧШЕНИЯ
function startUpgrade(id) {
    const b = gameState.businesses.find(b => b.id === id);
    if (!b || !b.owned) {
        alert('❌ Бизнес не найден!');
        return;
    }
    
    if (b.level >= b.maxLevel) {
        alert('❌ Достигнут максимальный уровень!');
        return;
    }
    
    if (b.upgradeEnd > Date.now()) {
        alert('⏱️ Улучшение уже идет!');
        return;
    }
    
    // Проверяем баланс
    if (gameState.balance < b.upgradeCost) {
        alert('❌ Недостаточно монет!');
        return;
    }
    
    // СПИСЫВАЕМ ДЕНЬГИ
    gameState.balance -= b.upgradeCost;
    
    // Запускаем улучшение
    b.lastUpgrade = Date.now();
    b.upgradeEnd = Date.now() + (b.upgradeTime * 1000);
    
    // Сохраняем
    saveGame();
    updateUI();
    closeBusinessModal();
    
    // Показываем уведомление
    alert(`✅ Улучшение запущено! Бизнес будет улучшен через ${b.upgradeTime} секунд.`);
    
    // Запускаем таймер
    setTimeout(() => {
        // Проверяем, не было ли отмены и не закончилось ли время
        if (b.upgradeEnd > 0 && b.upgradeEnd <= Date.now()) {
            // Повышаем уровень
            b.level++;
            
            // Увеличиваем стоимость следующего улучшения
            b.upgradeCost = Math.floor(b.upgradeCost * 2.5);
            
            // Увеличиваем время следующего улучшения
            b.upgradeTime = Math.floor(b.upgradeTime * 1.3);
            
            // Сбрасываем флаг улучшения
            b.upgradeEnd = 0;
            
            // Сохраняем
            saveGame();
            updateUI();
            
            // Уведомление
            if (b.level < b.maxLevel) {
                alert(`✅ ${b.name} улучшен до ${b.level} уровня!`);
            } else {
                alert(`🎉 ПОЗДРАВЛЯЮ! ${b.name} достиг максимального (20) уровня!`);
            }
        }
    }, b.upgradeTime * 1000);
}

    const b = gameState.businesses.find(b => b.id === id);
    if (!b) return;
    
    const modal = document.getElementById('businessModal');
    const modalContent = document.getElementById('businessModalContent');
    
    let content = `
        <div class="modal-title">${b.name}</div>
        <div style="text-align:center;">
            <div style="font-size:48px; margin:15px;">${b.name.charAt(0)}</div>
            <div style="margin:10px;">📊 УРОВЕНЬ: ${b.level}/${b.maxLevel}</div>
            <div style="margin:10px;">💰 ДОХОД: +${b.baseIncome * b.level}/сек</div>
            <div style="margin:10px;">📈 ВСЕГО ЗАРАБОТАНО: ${formatNumber(Math.floor(b.totalEarned))}</div>
            <div style="margin:10px;">⏱️ ВРЕМЯ УЛУЧШЕНИЯ: ${b.upgradeTime}С</div>
    `;
    
    if (b.level < b.maxLevel) {
        const upgrading = b.upgradeEnd > Date.now();
        if (upgrading) {
            const timeLeft = Math.ceil((b.upgradeEnd - Date.now()) / 1000);
            content += `
                <div style="margin:15px; color:#ff9800;">

                        🚀 УЛУЧШИТЬ (${formatNumber(b.upgradeCost)}💰)

    } else {

    content += '</div><div class="close-btn" onclick="closeBusinessModal()">ЗАКРЫТЬ</div>';
