<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clicker PRO — Мега-версия</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        
        .app-container {
            width: 100%;
            max-width: 400px;
            height: 95vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Шапка */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: center;
        }
        
        .username {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        
        .balance-container {
            display: flex;
            justify-content: space-between;
            gap: 5px;
            margin: 10px 0;
        }
        
        .balance-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 8px;
            border-radius: 10px;
            flex: 1;
        }
        
        .balance-label {
            font-size: 10px;
            opacity: 0.8;
        }
        
        .balance-value {
            font-size: 16px;
            font-weight: bold;
        }
        
        .level-bar {
            background: rgba(255, 255, 255, 0.2);
            height: 6px;
            border-radius: 3px;
            margin: 10px 0;
            overflow: hidden;
        }
        
        .level-progress {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            width: 0%;
            border-radius: 3px;
        }
        
        /* Навигация */
        .nav-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px;
            gap: 3px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        
        .nav-tabs::-webkit-scrollbar {
            display: none;
        }
        
        .nav-tab {
            flex: 1;
            min-width: 50px;
            text-align: center;
            padding: 8px 3px;
            color: rgba(255, 255, 255, 0.6);
            border-radius: 10px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.3s;
        }
        
        .nav-tab span {
            font-size: 16px;
            display: block;
            margin-bottom: 2px;
        }
        
        .nav-tab.active {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        
        /* Контент */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            color: white;
        }
        
        /* Главная */
        .clicker-area {
            text-align: center;
            padding: 20px 0;
        }
        
        .click-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            border-radius: 50%;
            width: 220px;
            height: 220px;
            font-size: 40px;
            color: white;
            cursor: pointer;
            margin: 10px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 4px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            transition: transform 0.1s;
        }
        
        .click-btn:active {
            transform: scale(0.95);
        }
        
        .click-btn span {
            font-size: 20px;
            margin-top: 10px;
        }
        
        .per-second {
            color: #4CAF50;
            font-size: 16px;
            margin: 10px 0;
        }
        
        /* Карточки */
        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .card-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #ffd700;
        }
        
        /* Кнопки */
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 5px 0;
            font-size: 14px;
            transition: transform 0.2s;
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
        }
        
        /* Магазин */
        .shop-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .item-info {
            flex: 1;
        }
        
        .item-name {
            font-weight: bold;
            color: #ffd700;
            font-size: 14px;
        }
        
        .item-desc {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .item-price {
            color: #4CAF50;
            font-weight: bold;
            font-size: 13px;
        }
        
        .item-level {
            color: #ff9800;
            font-size: 11px;
        }
        
        .buy-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-left: 5px;
        }
        
        .buy-btn-diamond {
            background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%);
            color: #333;
        }
        
        /* Босс */
        .boss-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
        }
        
        .boss-name {
            font-size: 24px;
            font-weight: bold;
            color: #f44336;
            margin-bottom: 10px;
        }
        
        .boss-health {
            background: rgba(255, 255, 255, 0.1);
            height: 25px;
            border-radius: 12px;
            margin: 15px 0;
            overflow: hidden;
            position: relative;
        }
        
        .boss-health-bar {
            height: 100%;
            background: linear-gradient(90deg, #f44336, #ff9800);
            width: 100%;
            transition: width 0.3s;
        }
        
        .boss-health-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 12px;
            font-weight: bold;
        }
        
        .boss-reward {
            color: #ffd700;
            font-size: 18px;
            margin: 10px 0;
        }
        
        /* Турнир */
        .tournament-header {
            text-align: center;
            margin-bottom: 15px;
        }
        
        .tournament-prize {
            font-size: 24px;
            color: #ffd700;
            font-weight: bold;
        }
        
        .tournament-timer {
            font-size: 18px;
            color: #ff9800;
            margin: 10px 0;
        }
        
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .rank-1 {
            color: #ffd700;
        }
        
        .rank-2 {
            color: #c0c0c0;
        }
        
        .rank-3 {
            color: #cd7f32;
        }
        
        /* Бизнес */
        .business-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
        }
        
        .business-name {
            font-size: 16px;
            font-weight: bold;
            color: #4CAF50;
        }
        
        .business-income {
            color: #ffd700;
            font-size: 14px;
        }
        
        /* Клан */
        .clan-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
        }
        
        .clan-name {
            font-size: 24px;
            color: #ffd700;
            font-weight: bold;
        }
        
        .clan-bank {
            font-size: 20px;
            margin: 15px 0;
        }
        
        /* Игры */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .game-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
        }
        
        .game-card span {
            font-size: 40px;
            display: block;
            margin-bottom: 10px;
        }
        
        /* Достижения */
        .achievement-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 8px;
        }
        
        .achievement-icon {
            font-size: 24px;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .achievement-name {
            font-weight: bold;
        }
        
        .achievement-reward {
            color: #ffd700;
            font-size: 12px;
        }
        
        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #16213e;
            border-radius: 20px;
            padding: 25px;
            max-width: 300px;
            width: 90%;
            color: white;
            text-align: center;
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #ffd700;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Шапка -->
        <div class="header">
            <div class="username" id="username">Загрузка...</div>
            
            <div class="balance-container">
                <div class="balance-box">
                    <div class="balance-label">💰 Монеты</div>
                    <div class="balance-value" id="balance">0</div>
                </div>
                <div class="balance-box">
                    <div class="balance-label">💎 Алмазы</div>
                    <div class="balance-value" id="diamonds">0</div>
                </div>
                <div class="balance-box">
                    <div class="balance-label">📊 Уровень</div>
                    <div class="balance-value" id="level">1</div>
                </div>
            </div>
            
            <div class="level-bar">
                <div class="level-progress" id="levelProgress"></div>
            </div>
        </div>
        
        <!-- Навигация -->
        <div class="nav-tabs" id="navTabs">
            <div class="nav-tab active" data-tab="home"><span>🏠</span>Главная</div>
            <div class="nav-tab" data-tab="shop"><span>🏪</span>Магазин</div>
            <div class="nav-tab" data-tab="tournament"><span>🏆</span>Турнир</div>
            <div class="nav-tab" data-tab="boss"><span>🐉</span>Босс</div>
            <div class="nav-tab" data-tab="clan"><span>👥</span>Клан</div>
            <div class="nav-tab" data-tab="business"><span>💼</span>Бизнес</div>
            <div class="nav-tab" data-tab="games"><span>🎮</span>Игры</div>
            <div class="nav-tab" data-tab="achievements"><span>🏅</span>Достиж</div>
        </div>
        
        <!-- Контент -->
        <div class="content" id="content">
            <!-- Сюда будет загружаться контент -->
        </div>
    </div>
    
    <!-- Модальное окно для игр -->
    <div class="modal" id="gameModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">Игра</div>
            <div id="modalContent"></div>
            <div class="modal-buttons">
                <button class="modal-btn" onclick="closeModal()" style="flex:1; padding:10px; background:#f44336; color:white; border:none; border-radius:10px;">Закрыть</button>
                <button class="modal-btn" id="modalActionBtn" style="flex:1; padding:10px; background:#4CAF50; color:white; border:none; border-radius:10px;">Играть</button>
            </div>
        </div>
    </div>
    
    <script>
        // Telegram
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }
        
        // ========== СОСТОЯНИЕ ИГРЫ ==========
        let gameState = {
            // Ресурсы
            balance: 1000,
            diamonds: 50,
            exp: 0,
            level: 1,
            
            // Улучшения
            clickPower: 1,
            clickPowerLevel: 0,
            autoClickerLevel: 0,
            critLevel: 0,
            
            // Статистика
            totalClicks: 0,
            totalEarned: 0,
            playTime: 0,
            
            // Бизнес
            factories: [0, 0, 0, 0, 0],
            factoryManagers: [false, false, false, false, false],
            
            // Турнир
            tournamentScore: 0,
            tournamentTime: 86400,
            
            // Босс
            bossLevel: 1,
            bossHealth: 1000,
            bossMaxHealth: 1000,
            bossesKilled: 0,
            
            // Клан
            clanName: "Нет клана",
            clanMembers: 1,
            clanBank: 0,
            
            // Игры
            gamesWon: 0,
            
            // Достижения
            achievements: {}
        };
        
        // Цены улучшений
        const prices = {
            clickPower: [50, 150, 500, 2000, 10000],
            autoClicker: [100, 300, 1000, 5000, 25000],
            crit: [200, 600, 2000, 10000, 50000]
        };
        
        // Названия фабрик
        const factoryNames = ["🍪 Пекарня", "🏭 Заводик", "🏢 Фабрика", "🏛️ Корпорация", "🌍 Империя"];
        const factoryIncome = [1, 5, 20, 100, 500];
        const factoryPrices = [100, 500, 2000, 10000, 50000];
        
        // Достижения
        const achievements = [
            { id: 0, name: "Новичок", desc: "Накликать 100 монет", icon: "🌱", target: 100, type: "earn", reward: 50 },
            { id: 1, name: "Трудяга", desc: "Накликать 1000 монет", icon: "💪", target: 1000, type: "earn", reward: 200 },
            { id: 2, name: "Магнат", desc: "Накликать 10000 монет", icon: "💰", target: 10000, type: "earn", reward: 500 },
            { id: 3, name: "Кликер", desc: "Сделать 100 кликов", icon: "👆", target: 100, type: "clicks", reward: 100 },
            { id: 4, name: "Кликер-про", desc: "Сделать 1000 кликов", icon: "👆", target: 1000, type: "clicks", reward: 300 },
            { id: 5, name: "Охотник", desc: "Победить 10 боссов", icon: "🐉", target: 10, type: "boss", reward: 200 },
            { id: 6, name: "Герой", desc: "Победить 100 боссов", icon: "🏆", target: 100, type: "boss", reward: 1000 }
        ];
        
        // ========== ЗАГРУЗКА/СОХРАНЕНИЕ ==========
        function loadGame() {
            const saved = localStorage.getItem('megaClickerSave');
            if (saved) {
                try {
                    const loaded = JSON.parse(saved);
                    gameState = { ...gameState, ...loaded };
                } catch(e) {
                    console.log('Ошибка загрузки');
                }
            }
            updateUI();
        }
        
        function saveGame() {
            localStorage.setItem('megaClickerSave', JSON.stringify(gameState));
        }
        
        // ========== ОБНОВЛЕНИЕ UI ==========
        function updateUI() {
            document.getElementById('balance').textContent = Math.floor(gameState.balance);
            document.getElementById('diamonds').textContent = Math.floor(gameState.diamonds);
            document.getElementById('level').textContent = gameState.level;
            
            const expNeeded = gameState.level * 100;
            const expPercent = (gameState.exp / expNeeded) * 100;
            document.getElementById('levelProgress').style.width = Math.min(expPercent, 100) + '%';
            
            // Обновляем текущую вкладку
            const activeTab = document.querySelector('.nav-tab.active')?.dataset.tab || 'home';
            renderTab(activeTab);
        }
        
        // ========== ОТОБРАЖЕНИЕ ВКЛАДОК ==========
        function renderTab(tab) {
            const content = document.getElementById('content');
            
            if (tab === 'home') {
                renderHome(content);
            } else if (tab === 'shop') {
                renderShop(content);
            } else if (tab === 'tournament') {
                renderTournament(content);
            } else if (tab === 'boss') {
                renderBoss(content);
            } else if (tab === 'clan') {
                renderClan(content);
            } else if (tab === 'business') {
                renderBusiness(content);
            } else if (tab === 'games') {
                renderGames(content);
            } else if (tab === 'achievements') {
                renderAchievements(content);
            }
        }
        
        // Главная
        function renderHome(content) {
            const clickPower = getClickPower();
            content.innerHTML = `
                <div class="clicker-area">
                    <div class="per-second">+${gameState.autoClickerLevel}/сек</div>
                    <button class="click-btn" id="clickBtn">
                        👆
                        <span>+${clickPower}</span>
                    </button>
                    <div style="margin-top:20px; color:rgba(255,255,255,0.7);">
                        ⚡ Шанс крита: ${gameState.critLevel * 10}%
                    </div>
                </div>
            `;
            
            document.getElementById('clickBtn').addEventListener('click', handleClick);
        }
        
        // Магазин
        function renderShop(content) {
            let html = '<div class="card"><div class="card-title">🏪 МАГАЗИН</div>';
            
            // Сила клика
            if (gameState.clickPowerLevel < 5) {
                html += `
                    <div class="shop-item">
                        <div class="item-info">
                            <div class="item-name">💪 Сила клика +${gameState.clickPowerLevel + 1}</div>
                            <div class="item-desc">Увеличивает доход с клика</div>
                            <div class="item-price">${prices.clickPower[gameState.clickPowerLevel]} монет</div>
                            <div class="item-level">Уровень: ${gameState.clickPowerLevel}/5</div>
                        </div>
                        <button class="buy-btn" onclick="buyUpgrade('clickPower')">Купить</button>
                    </div>
                `;
            }
            
            // Автокликер
            if (gameState.autoClickerLevel < 5) {
                html += `
                    <div class="shop-item">
                        <div class="item-info">
                            <div class="item-name">🤖 Автокликер +1/сек</div>
                            <div class="item-desc">Автоматически приносит монеты</div>
                            <div class="item-price">${prices.autoClicker[gameState.autoClickerLevel]} монет</div>
                            <div class="item-level">Уровень: ${gameState.autoClickerLevel}/5</div>
                        </div>
                        <button class="buy-btn" onclick="buyUpgrade('autoClicker')">Купить</button>
                    </div>
                `;
            }
            
            // Крит
            if (gameState.critLevel < 5) {
                html += `
                    <div class="shop-item">
                        <div class="item-info">
                            <div class="item-name">⚡ Крит +10%</div>
                            <div class="item-desc">Шанс умножить тап x10</div>
                            <div class="item-price">${prices.crit[gameState.critLevel]} монет</div>
                            <div class="item-level">Уровень: ${gameState.critLevel}/5</div>
                        </div>
                        <button class="buy-btn" onclick="buyUpgrade('crit')">Купить</button>
                    </div>
                `;
            }
            
            // Премиум
            html += `
                <div style="margin:20px 0 10px; color:#ffd700;">💎 ПРЕМИУМ</div>
                <div class="shop-item">
                    <div class="item-info">
                        <div class="item-name">💰 Обмен на монеты</div>
                        <div class="item-desc">1💎 = 100💰</div>
                    </div>
                    <button class="buy-btn buy-btn-diamond" onclick="exchangeDiamonds(1)">Обменять</button>
                </div>
                <div class="shop-item">
                    <div class="item-info">
                        <div class="item-name">✨ Мгновенный уровень</div>
                        <div class="item-desc">+100 опыта</div>
                        <div class="item-price" style="color:#ffd700;">30💎</div>
                    </div>
                    <button class="buy-btn buy-btn-diamond" onclick="buyExp()">Купить</button>
                </div>
            </div>`;
            
            content.innerHTML = html;
        }
        
        // Турнир
        function renderTournament(content) {
            content.innerHTML = `
                <div class="card">
                    <div class="card-title">🏆 ТУРНИР</div>
                    <div class="tournament-header">
                        <div class="tournament-prize" id="tournamentPrize">${5000 + gameState.tournamentScore * 10} 💰</div>
                        <div class="tournament-timer" id="tournamentTimer">24:00:00</div>
                    </div>
                    <button class="btn btn-success" onclick="joinTournament()">Участвовать (100💰)</button>
                    <div style="margin-top:20px;">
                        <div id="leaderboard"></div>
                    </div>
                    <div style="text-align:center; margin-top:15px;">Ваш счет: ${gameState.tournamentScore}</div>
                </div>
            `;
            updateLeaderboard();
            startTournamentTimer();
        }
        
        // Босс
        function renderBoss(content) {
            const healthPercent = (gameState.bossHealth / gameState.bossMaxHealth) * 100;
            content.innerHTML = `
                <div class="boss-card">
                    <div class="boss-name">🐉 БОСС УРОВНЯ ${gameState.bossLevel}</div>
                    <div class="boss-health">
                        <div class="boss-health-bar" style="width: ${healthPercent}%"></div>
                        <div class="boss-health-text">${Math.floor(gameState.bossHealth)}/${gameState.bossMaxHealth}</div>
                    </div>
                    <div class="boss-reward">💰 ${gameState.bossLevel * 100} монет</div>
                    <div class="boss-reward">💎 ${Math.floor(gameState.bossLevel / 2) + 1} алмазов</div>
                    <button class="btn btn-danger" onclick="attackBoss()">⚔️ Атаковать</button>
                </div>
            `;
        }
        
        // Клан
        function renderClan(content) {
            content.innerHTML = `
                <div class="clan-card">
                    <div class="clan-name" id="clanName">${gameState.clanName}</div>
                    <div>Участников: ${gameState.clanMembers}</div>
                    <div class="clan-bank">💰 Банк: ${gameState.clanBank}</div>
                    <button class="btn" onclick="donateToClan()">Пожертвовать 1000💰</button>
                    ${gameState.clanName === "Нет клана" ? '<button class="btn btn-success" onclick="createClan()">Создать клан (500💎)</button>' : ''}
                </div>
            `;
        }
        
        // Бизнес
        function renderBusiness(content) {
            let html = '<div class="card"><div class="card-title">💼 БИЗНЕС</div>';
            
            for (let i = 0; i < 5; i++) {
                html += `
                    <div class="business-item">
                        <div style="display:flex; justify-content:space-between;">
                            <span class="business-name">${factoryNames[i]}</span>
                            <span class="business-income">+${factoryIncome[i]}/сек</span>
                        </div>
                        <div style="margin:5px 0;">Куплено: ${gameState.factories[i]}/5</div>
                        <div style="display:flex; gap:5px;">
                            <button class="buy-btn" style="flex:2;" onclick="buyFactory(${i})">Купить (${factoryPrices[i]}💰)</button>
                            ${!gameState.factoryManagers[i] ? `<button class="buy-btn buy-btn-diamond" style="flex:1;" onclick="hireManager(${i})">👔 (50💎)</button>` : ''}
                        </div>
                    </div>
                `;
            }
            
            html += '</div>';
            content.innerHTML = html;
        }
        
        // Игры
        function renderGames(content) {
            content.innerHTML = `
                <div class="card">
                    <div class="card-title">🎮 МИНИ-ИГРЫ</div>
                    <div class="games-grid">
                        <div class="game-card" onclick="openGame('roulette')">
                            <span>🎰</span>
                            <div>Рулетка</div>
                        </div>
                        <div class="game-card" onclick="openGame('guess')">
                            <span>🔢</span>
                            <div>Угадай число</div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // Достижения
        function renderAchievements(content) {
            let html = '<div class="card"><div class="card-title">🏅 ДОСТИЖЕНИЯ</div>';
            
            achievements.forEach(ach => {
                let progress = 0;
                if (ach.type === 'earn') progress = gameState.totalEarned;
                if (ach.type === 'clicks') progress = gameState.totalClicks;
                if (ach.type === 'boss') progress = gameState.bossesKilled;
                
                const completed = progress >= ach.target;
                html += `
                    <div class="achievement-item">
                        <div class="achievement-icon">${ach.icon}</div>
                        <div style="flex:1;">
                            <div class="achievement-name">${ach.name}</div>
                            <div style="font-size:11px;">${ach.desc}</div>
                            <div class="achievement-reward">+${ach.reward}💎</div>
                            <div style="font-size:10px;">${progress}/${ach.target}</div>
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            content.innerHTML = html;
        }
        
        // ========== ИГРОВАЯ МЕХАНИКА ==========
        function getClickPower() {
            let power = gameState.clickPower * (1 + gameState.clickPowerLevel * 0.5);
            
            if (Math.random() * 100 < gameState.critLevel * 10) {
                power *= 10;
            }
            
            return Math.floor(power);
        }
        
        function handleClick() {
            const power = getClickPower();
            gameState.balance += power;
            gameState.totalClicks++;
            gameState.totalEarned += power;
            gameState.tournamentScore += power;
            
            gameState.exp += power / 10;
            checkLevelUp();
            
            updateUI();
            saveGame();
            checkAchievements();
        }
        
        function checkLevelUp() {
            while (gameState.exp >= gameState.level * 100) {
                gameState.exp -= gameState.level * 100;
                gameState.level++;
                gameState.diamonds += gameState.level * 10;
                alert(`🎉 Уровень ${gameState.level}! +${gameState.level * 10}💎`);
            }
        }
        
        // ========== ПОКУПКИ ==========
        function buyUpgrade(type) {
            const level = gameState[type + 'Level'];
            if (level >= 5) return;
            
            const price = prices[type][level];
            
            if (gameState.balance >= price) {
                gameState.balance -= price;
                gameState[type + 'Level']++;
                updateUI();
                saveGame();
            } else {
                alert('❌ Недостаточно монет!');
            }
        }
        
        function exchangeDiamonds(amount) {
            if (gameState.diamonds >= amount) {
                gameState.diamonds -= amount;
                gameState.balance += amount * 100;
                updateUI();
                saveGame();
            }
        }
        
        function buyExp() {
            if (gameState.diamonds >= 30) {
                gameState.diamonds -= 30;
                gameState.exp += 100;
                checkLevelUp();
                updateUI();
                saveGame();
            }
        }
        
        // ========== БИЗНЕС ==========
        function buyFactory(index) {
            if (gameState.factories[index] >= 5) return;
            
            if (gameState.balance >= factoryPrices[index]) {
                gameState.balance -= factoryPrices[index];
                gameState.factories[index]++;
                updateUI();
                saveGame();
            } else {
                alert('❌ Недостаточно монет!');
            }
        }
        
        function hireManager(index) {
            if (gameState.diamonds >= 50 && !gameState.factoryManagers[index]) {
                gameState.diamonds -= 50;
                gameState.factoryManagers[index] = true;
                updateUI();
                saveGame();
            } else {
                alert('❌ Недостаточно алмазов!');
            }
        }
        
        // ========== БОСС ==========
        function attackBoss() {
            const damage = getClickPower();
            gameState.bossHealth -= damage;
            
            if (gameState.bossHealth <= 0) {
                gameState.bossHealth = 0;
                defeatBoss();
            }
            
            updateUI();
            saveGame();
        }
        
        function defeatBoss() {
            gameState.balance += gameState.bossLevel * 100;
            gameState.diamonds += Math.floor(gameState.bossLevel / 2) + 1;
            gameState.bossesKilled++;
            gameState.bossLevel++;
            gameState.bossMaxHealth = gameState.bossLevel * 1000;
            gameState.bossHealth = gameState.bossMaxHealth;
            
            alert(`🎉 Босс побежден! +${gameState.bossLevel * 100}💰 +${Math.floor(gameState.bossLevel / 2) + 1}💎`);
            checkAchievements();
        }
        
        // ========== ТУРНИР ==========
        function joinTournament() {
            if (gameState.balance >= 100) {
                gameState.balance -= 100;
                gameState.tournamentScore = 0;
                updateUI();
                saveGame();
            }
        }
        
        function updateLeaderboard() {
            const leaderboard = document.getElementById('leaderboard');
            if (!leaderboard) return;
            
            let html = '<div style="color:#ffd700; margin-bottom:10px;">ТОП-5</div>';
            for (let i = 1; i <= 5; i++) {
                const rankClass = i === 1 ? 'rank-1' : i === 2 ? 'rank-2' : i === 3 ? 'rank-3' : '';
                const score = i === 1 ? 10000 : i === 2 ? 5000 : i === 3 ? 3000 : 1000;
                
                html += `
                    <div class="leaderboard-item">
                        <span class="${rankClass}">${i}. Игрок ${i}</span>
                        <span>${score}</span>
                    </div>
                `;
            }
            leaderboard.innerHTML = html;
        }
        
        function startTournamentTimer() {
            setInterval(() => {
                if (gameState.tournamentTime > 0) {
                    gameState.tournamentTime--;
                    
                    const hours = Math.floor(gameState.tournamentTime / 3600);
                    const minutes = Math.floor((gameState.tournamentTime % 3600) / 60);
                    const seconds = gameState.tournamentTime % 60;
                    
                    const timer = document.getElementById('tournamentTimer');
                    if (timer) {
                        timer.textContent = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                    }
                }
            }, 1000);
        }
        
        // ========== КЛАН ==========
        function donateToClan() {
            if (gameState.balance >= 1000) {
                gameState.balance -= 1000;
                gameState.clanBank += 1000;
                updateUI();
                saveGame();
            }
        }
        
        function createClan() {
            if (gameState.diamonds >= 500) {
                const name = prompt('Название клана:');
                if (name) {
                    gameState.diamonds -= 500;
                    gameState.clanName = name;
                    updateUI();
                    saveGame();
                }
            } else {
                alert('❌ Недостаточно алмазов!');
            }
        }
        
        // ========== МИНИ-ИГРЫ ==========
        function openGame(game) {
            const modal = document.getElementById('gameModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            const actionBtn = document.getElementById('modalActionBtn');
            
            modal.classList.add('active');
            
            if (game === 'roulette') {
                modalTitle.textContent = '🎰 РУЛЕТКА';
                modalContent.innerHTML = `
                    <p>Ставка: 100💰</p>
                    <p>Красное = x2, Черное = x0</p>
                    <div style="display:flex; gap:10px; margin:15px 0;">
                        <button onclick="playRoulette('red')" style="flex:1; padding:10px; background:#f44336; color:white; border:none; border-radius:10px;">🔴 Красное</button>
                        <button onclick="playRoulette('black')" style="flex:1; padding:10px; background:#333; color:white; border:none; border-radius:10px;">⚫ Черное</button>
                    </div>
                `;
                actionBtn.style.display = 'none';
            } else if (game === 'guess') {
                modalTitle.textContent = '🔢 УГАДАЙ ЧИСЛО';
                modalContent.innerHTML = `
                    <p>Ставка: 100💰</p>
                    <p>Угадай число от 1 до 5 (x5)</p>
                    <input type="number" id="guessInput" min="1" max="5" style="width:100%; padding:10px; margin:10px 0; background:rgba(255,255,255,0.1); color:white; border:none; border-radius:10px; text-align:center;">
                `;
                actionBtn.style.display = 'block';
                actionBtn.textContent = 'Проверить';
                actionBtn.onclick = playGuess;
            }
        }
        
        function playRoulette(color) {
            if (gameState.balance < 100) {
                alert('❌ Недостаточно монет!');
                return;
            }
            
            gameState.balance -= 100;
            const result = Math.random() < 0.5 ? 'red' : 'black';
            
            if (color === result) {
                gameState.balance += 200;
                gameState.gamesWon++;
                alert('🎉 Вы выиграли! +200💰');
            } else {
                alert('😢 Вы проиграли...');
            }
            
            closeModal();
            updateUI();
            saveGame();
        }
        
        function playGuess() {
            const guess = parseInt(document.getElementById('guessInput')?.value);
            if (!guess || guess < 1 || guess > 5) {
                alert('❌ Введите число от 1 до 5');
                return;
            }
            
            if (gameState.balance < 100) {
                alert('❌ Недостаточно монет!');
                return;
            }
            
            gameState.balance -= 100;
            const number = Math.floor(Math.random() * 5) + 1;
            
            if (guess === number) {
                gameState.balance += 500;
                gameState.gamesWon++;
                alert(`🎉 Угадали! Число было ${number}! +500💰`);
            } else {
                alert(`😢 Не угадали... Было число ${number}`);
            }
            
            closeModal();
            updateUI();
            saveGame();
        }
        
        function closeModal() {
            document.getElementById('gameModal').classList.remove('active');
        }
        
        // ========== ДОСТИЖЕНИЯ ==========
        function checkAchievements() {
            achievements.forEach(ach => {
                let progress = 0;
                if (ach.type === 'earn') progress = gameState.totalEarned;
                if (ach.type === 'clicks') progress = gameState.totalClicks;
                if (ach.type === 'boss') progress = gameState.bossesKilled;
                
                if (progress >= ach.target && !gameState.achievements[ach.id]) {
                    gameState.diamonds += ach.reward;
                    gameState.achievements[ach.id] = true;
                    alert(`🏅 Достижение: ${ach.name}! +${ach.reward}💎`);
                }
            });
            saveGame();
        }
        
        // ========== АВТОМАТИЧЕСКИЕ ПРОЦЕССЫ ==========
        setInterval(() => {
            // Автокликер
            if (gameState.autoClickerLevel > 0) {
                gameState.balance += gameState.autoClickerLevel;
                gameState.totalEarned += gameState.autoClickerLevel;
            }
            
            // Бизнес
            for (let i = 0; i < 5; i++) {
                if (gameState.factories[i] > 0) {
                    let income = factoryIncome[i] * gameState.factories[i];
                    if (gameState.factoryManagers[i]) income *= 2;
                    gameState.balance += income;
                    gameState.totalEarned += income;
                }
            }
            
            gameState.playTime++;
            updateUI();
            saveGame();
        }, 1000);
        
        // ========== НАВИГАЦИЯ ==========
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                renderTab(this.dataset.tab);
            });
        });
        
        // ========== ЗАПУСК ==========
        window.onload = function() {
            loadGame();
            
            if (tg) {
                const user = tg.initDataUnsafe?.user;
                if (user) {
                    document.getElementById('username').textContent = `Привет, ${user.first_name || 'Игрок'}! 👋`;
                }
            }
            
            renderTab('home');
        };
    </script>
</body>
</html>
